    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/gyruss/ship.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_gy_enemy
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/gyruss/enemy.png"
    type: RGB565
    transparency: alpha_channel
  - id: img_gy_enemy2
    file: "https://raw.githubusercontent.com/MichalZaniewicz/esphome-guition-jc3636k718c-va/beta/assets/sprites/gyruss/enemy2.png"
    type: RGB565
    transparency: alpha_channel
