        - image: { id: gy_e5, x: 400, y: 400, src: img_gy_enemy2 }
        - image: { id: gy_e6, x: 400, y: 400, src: img_gy_enemy }
        - image: { id: gy_e7, x: 400, y: 400, src: img_gy_enemy2 }
        - image: { id: gy_e8, x: 400, y: 400, src: img_gy_enemy }
        - image: { id: gy_e9, x: 400, y: 400, src: img_gy_enemy2 }
        - image: { id: gy_b0, x: 400, y: 400, src: img_gy_bullet }
        - image: { id: gy_b1, x: 400, y: 400, src: img_gy_bullet }
