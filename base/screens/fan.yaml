# =============================================================================
# Personal Fork Component: Custom Fan Screen Layout & Logic (Full Screen Tap Power)
# Saved as: base/screens/fan.yaml
# =============================================================================

globals:
  - id: g_fan_speed
    type: int
    initial_value: '0'
  - id: last_tap_seq
    type: int
    initial_value: '0'

script:
  - id: delay_send_speed
    mode: restart
    parameters:
      value: int
    then:
      - delay: 500ms
      - homeassistant.action:
          action: number.set_value
          data:
            entity_id: ${fan_speed_entity}
            value: !lambda 'return std::to_string(value);'

sensor:
  - platform: homeassistant
    entity_id: ${room_temp_entity}
    id: fan_room_temp
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_room_temp
            text: !lambda |-
              char b[16];
              snprintf(b, sizeof(b), "%.1f°C", x);
              return std::string(b);

  - platform: homeassistant
    entity_id: ${fan_speed_entity}
    id: fan_speed_sensor
    on_value:
      then:
        - lambda: 'id(g_fan_speed) = (int)x;'
        - lvgl.arc.update:
            id: arc_fan_speed
            value: !lambda 'return (int)x;'
        - lvgl.label.update:
            id: lbl_fan_fraction
            text: !lambda |-
              char b[16];
              snprintf(b, sizeof(b), "%d / 26", (int)x);
              return std::string(b);

text_sensor:
  - platform: homeassistant
    entity_id: ${fan_entity}
    id: fan_state_sensor
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fan_status
            text: !lambda 'return std::string(x == "on" ? "Running" : "Off");'

binary_sensor:
  - platform: homeassistant
    entity_id: ${fan_horiz_osc_entity}
    id: fan_horiz_state
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_horiz_osc
            bg_color: !lambda 'return x ? lv_color_hex(0x2A3B4C) : lv_color_hex(0x161A22);'

  - platform: homeassistant
    entity_id: ${fan_vert_osc_entity}
    id: fan_vert_state
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_vert_osc
            bg_color: !lambda 'return x ? lv_color_hex(0x2A3B4C) : lv_color_hex(0x161A22);'

  - platform: homeassistant
    entity_id: ${fan_entity}
    id: fan_power_state
    on_state:
      then:
        - lvgl.label.update:
            id: lbl_fan_status
            text_color: !lambda 'return x ? lv_color_hex(0x42F4DC) : lv_color_hex(0x555555);'

lvgl:
  pages:
    - id: page_fan  
      bg_color: 0x000000
      widgets:
        - obj:   
            align: CENTER
            width: 340
            height: 340
            radius: 170
            bg_opa: TRANSP
            border_width: 2
            border_color: 0x1A1F2A
            border_opa: 70%
            clickable: false
            scrollable: false

        # 1. Speed Target Track Ring
        - arc:
            id: arc_fan_speed
            align: CENTER
            width: 300
            height: 300
            arc_width: 10
            min_value: 0
            max_value: 26
            adjustable: false
            start_angle: 135
            end_angle: 45
            arc_color: 0x222222
            indicator:
              arc_color: 0x42F4DC
              arc_width: 10
            on_value:
              then:
                - lvgl.label.update:
                    id: lbl_fan_fraction
                    text: !lambda |-
                      char b[16];
                      snprintf(b, sizeof(b), "%d / 26", (int)x);
                      return std::string(b);
                - script.execute:
                    id: delay_send_speed
                    value: !lambda 'return (int)x;'

        # 2. Temperature Readout (Moved up to y: -55)
        - label:
            id: lbl_room_temp
            text: "--.-°C"
            align: CENTER
            y: -55
            text_color: 0xFFFFFF
            text_font: montserrat_48

        # 3. Fraction Steps Indicator
        - label:
            id: lbl_fan_fraction
            text: "0 / 26"
            align: CENTER
            y: 24
            text_color: 0xFFFFFF
            text_font: montserrat_24

        # 4. Power Status Caption
        - label:
            id: lbl_fan_status
            text: "Off"
            align: CENTER
            y: 56
            text_color: 0x555555
            text_font: font_med

        # 5. Symmetrical Button Left: Horizontal Oscillation
        - button:  
            id: btn_horiz_osc
            width: 64
            height: 44
            x: -45
            y: 115
            align: CENTER
            bg_color: 0x161A22
            bg_opa: COVER
            border_width: 1
            border_color: 0x2A303C
            radius: 10
            on_click:
              then:
                - homeassistant.action:
                    action: switch.toggle
                    data:
                      entity_id: ${fan_horiz_osc_entity}
            widgets:
              - label:
                  text: "HOR"
                  align: CENTER
                  text_color: 0x9AA3B0
                  text_font: font_artist

        # 6. Symmetrical Button Right: Vertical Oscillation
        - button:  
            id: btn_vert_osc
            width: 64
            height: 44
            x: 45
            y: 115
            align: CENTER
            bg_color: 0x161A22
            bg_opa: COVER
            border_width: 1
            border_color: 0x2A303C
            radius: 10
            on_click:
              then:
                - homeassistant.action:
                    action: switch.toggle
                    data:
                      entity_id: ${fan_vert_osc_entity}
            widgets:
              - label:
                  text: "VER"
                  align: CENTER
                  text_color: 0x9AA3B0
                  text_font: font_artist

interval:
  - interval: 50ms
    then:
      # A. Page Navigation Requests
      - if:
          condition:
            lambda: 'return id(g_nav_req) && id(g_base) == 11;'
          then:
            - lambda: 'id(g_nav_req) = false;'
            - if: { condition: { lambda: 'return id(g_nav_anim) == 0;' }, then: [lvgl.page.show: { id: page_fan, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim) == 1;' }, then: [lvgl.page.show: { id: page_fan, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim) == 2;' }, then: [lvgl.page.show: { id: page_fan, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim) == 3;' }, then: [lvgl.page.show: { id: page_fan, animation: move_bottom, time: 250ms }] }

      # B. Intercept Knob Focus Natively
      - lambda: |-
          if (id(g_base) == 11 && id(g_mode) == 0) {
            id(g_knob_capture) = true;
          } else if (id(g_base) != 11 && id(g_knob_capture)) {
            id(g_knob_capture) = false;
          }

      # C. Process Dial Speed Rotation
      - if:
          condition:
            lambda: 'return id(g_base) == 11 && id(g_knob_delta) != 0;'
          then:
            - lambda: |-
                int delta = id(g_knob_delta);
                id(g_knob_delta) = 0;
                int target = id(g_fan_speed) + delta;
                if (target < 0) target = 0;
                if (target > 26) target = 26;
                id(g_fan_speed) = target;
            - lvgl.arc.update:
                id: arc_fan_speed
                value: !lambda 'return id(g_fan_speed);'
            - lvgl.label.update:
                id: lbl_fan_fraction
                text: !lambda |-
                  char b[16];
                  snprintf(b, sizeof(b), "%d / 26", id(g_fan_speed));
                  return std::string(b);
            - script.execute:
                id: delay_send_speed
                value: !lambda 'return id(g_fan_speed);'

      # D. Process Full Screen Taps (Filters Swipes Automatically)[cite: 1]
      - if:
          condition:
            lambda: 'return id(g_base) == 11 && id(g_mode) == 0 && id(g_tap_seq) != id(last_tap_seq);'
          then:
            - lambda: 'id(last_tap_seq) = id(g_tap_seq);'
            - homeassistant.action:
                action: fan.toggle
                data:
                  entity_id: ${fan_entity}
