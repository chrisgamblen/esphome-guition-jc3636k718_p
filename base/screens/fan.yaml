# =============================================================================
# Custom Fan Controller Screen Layout & Logic
# =============================================================================

# Background script to debounce physical dial rotation
script:
  - id: delay_send_speed
    mode: restart
    parameters:
      value: int
    then:
      # Protective loop check: only talk to HA if the user moved the dial away from the current state
      - if:
          condition:
            lambda: 'return (int)id(fan_speed_sensor).state != value;'
          then:
            - delay: 800ms  # The short transmission delay interval
            - homeassistant.service:
                service: number.set_value
                data:
                  entity_id: ${fan_speed_entity}
                  value: !lambda 'return str_snprintf("%d", 0, value);'

# Track state values from your old Home Assistant instance
sensor:
  - platform: homeassistant
    entity_id: ${room_temp_entity}
    id: fan_room_temp
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_room_temp
            # Formats the decimal number to a standard string layout
            text: !lambda |-
              char b[16];
              snprintf(b, sizeof(b), "%.1f°C", x);
              return std::string(b);

  - platform: homeassistant
    entity_id: ${fan_speed_entity}
    id: fan_speed_sensor
    on_value:
      then:
        - lvgl.arc.update:
            id: arc_fan_speed
            value: !lambda 'return (int)x;'
        - lvgl.label.update:
            id: lbl_fan_fraction
            text: !lambda |-
              char b[16];
              snprintf(b, sizeof(b), "%d / 26", (int)x);
              return std::string(b);

text_sensor:
  - platform: homeassistant
    entity_id: ${fan_entity}
    id: fan_state_sensor
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_fan_status
            # Wrapped inside std::string to satisfy the compiler formatting engine
            text: !lambda 'return std::string(x == "on" ? "Running" : "Off");'

            
binary_sensor:
  - platform: homeassistant
    entity_id: ${fan_horiz_osc_entity}
    id: fan_horiz_state
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_horiz_osc
            # Wrapped in lv_color_hex to properly register as a UI background color
            bg_color: !lambda 'return x ? lv_color_hex(0x2A3B4C) : lv_color_hex(0x1A1A1A);'

  - platform: homeassistant
    entity_id: ${fan_vert_osc_entity}
    id: fan_vert_state
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_vert_osc
            # Wrapped in lv_color_hex to properly register as a UI background color
            bg_color: !lambda 'return x ? lv_color_hex(0x2A3B4C) : lv_color_hex(0x1A1A1A);'

  - platform: homeassistant
    entity_id: ${fan_entity}
    id: fan_power_state
    on_state:
      then:
        - lvgl.label.update:
            id: lbl_btn_power
            # Wrapped in lv_color_hex to properly register as a UI text color
            text_color: !lambda 'return x ? lv_color_hex(0x00FF88) : lv_color_hex(0x555555);'

# Draw the visual screen components
lvgl:
  pages:
    - id: page_fan  
      bg_color: 0x000000  # True black background to melt into the screen bezel
      widgets:
        
        # Faint background accent ring for design depth
        - obj:   
            align: CENTER
            width: 340
            height: 340
            radius: 170
            bg_opa: TRANSP
            border_width: 2
            border_color: 0x1A1F2A
            border_opa: 70%
            clickable: false
            scrollable: false

        # 1. Main Fan Speed Track Arc (Matches the system volume UI theme)
        - arc:
            id: arc_fan_speed
            align: CENTER
            width: 300
            height: 300
            arc_width: 10
            min_value: 0
            max_value: 26
            bg_color: 0x0C4A44
            adjustable: false
            start_angle: 135
            end_angle: 45
            indicator:
              arc_color: 0x42F4DC
              arc_width: 10
            on_value:
              then:
                - lvgl.label.update:
                    id: lbl_fan_fraction
                    text: !lambda |-
                      char b[16];
                      snprintf(b, sizeof(b), "%d / 26", (int)x);
                      return std::string(b);
                - script.execute:
                    id: delay_send_speed
                    value: !lambda 'return (int)x;'

        # 2. Main Temperature Display (Big, polished center positioning)
        - label:
            id: lbl_room_temp
            text: "--.-°C"
            align: CENTER
            y: -30
            text_color: 0xFFFFFF
            text_font: montserrat_48

        # 3. Fan Speed Fraction Readout
        - label:
            id: lbl_fan_fraction
            text: "0 / 26"
            align: CENTER
            y: 24
            text_color: 0xFFFFFF
            text_font: montserrat_24

        # 4. Status Line (Running / Off)
        - label:
            id: lbl_fan_status
            text: "Off"
            align: CENTER
            y: 56
            text_color: 0xF5B83D   # Matches amber/gold system alert accent tone
            text_font: font_med

        # 5. Button Row: Horizontal Oscillation Toggle
        - button:  
            id: btn_horiz_osc
            width: 54
            height: 44
            x: -64
            y: 115
            align: CENTER
            bg_color: 0x161A22
            bg_opa: COVER          # Masks out background leakage lines
            border_width: 1
            border_color: 0x2A303C
            radius: 10
            on_click:
              then:
                - homeassistant.service:
                    service: switch.toggle
                    data:
                      entity_id: ${fan_horiz_osc_entity}
            widgets:
              - label:
                  text: "HOR"      # Replaced arrow glyph with clear text to prevent tofu
                  align: CENTER
                  text_color: 0x9AA3B0
                  text_font: font_artist

        # 6. Button Row: Vertical Oscillation Toggle
        - button:  
            id: btn_vert_osc
            width: 54
            height: 44
            x: 0
            y: 115
            align: CENTER
            bg_color: 0x161A22
            bg_opa: COVER
            border_width: 1
            border_color: 0x2A303C
            radius: 10
            on_click:
              then:
                - homeassistant.service:
                    service: switch.toggle
                    data:
                      entity_id: ${fan_vert_osc_entity}
            widgets:
              - label:
                  text: "VER"
                  align: CENTER
                  text_color: 0x9AA3B0
                  text_font: font_artist

        # 7. Button Row: Main Power Toggle (Uses Native MDI Font Icon)
        - button:  
            id: btn_fan_power
            width: 54
            height: 44
            x: 64
            y: 115
            align: CENTER
            bg_color: 0x161A22
            bg_opa: COVER
            border_width: 1
            border_color: 0x2A303C
            radius: 10
            on_click:
              then:
                - homeassistant.service:
                    service: fan.toggle
                    data:
                      entity_id: ${fan_entity}
            widgets:
              - label:
                  id: lbl_btn_power
                  text: "\U000f0425" # Explicitly maps to the compiled MDI Power Glyph
                  align: CENTER
                  text_color: 0x555555
                  text_font: icons34 # Forces selection from the loaded icon asset pack

# Add this to the bottom of base/screens/fan.yaml
interval:
  - interval: 50ms
    then:
      # A. Handle Slide Page Navigation Requests (Keep this intact)
      - if:
          condition:
            lambda: 'return id(g_nav_req) && id(g_base) == 11;'
          then:
            - lambda: 'id(g_nav_req) = false;'
            - if: { condition: { lambda: 'return id(g_nav_anim) == 0;' }, then: [lvgl.page.show: { id: page_fan, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim) == 1;' }, then: [lvgl.page.show: { id: page_fan, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim) == 2;' }, then: [lvgl.page.show: { id: page_fan, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim) == 3;' }, then: [lvgl.page.show: { id: page_fan, animation: move_bottom, time: 250ms }] }

      # B. Intercept Knob Focus Natively
      - lambda: |-
          // If looking at our fan page (11) and not in a menu (0), hijack the knob focus
          if (id(g_base) == 11 && id(g_mode) == 0) {
            id(g_knob_capture) = true;
          } else if (id(g_base) != 11 && id(g_knob_capture)) {
            id(g_knob_capture) = false; // Give focus back to volume if we swipe away
          }

      # C. Process Dial Rotation Locally
      - if:
          condition:
            lambda: 'return id(g_base) == 11 && id(g_knob_delta) != 0;'
          then:
            - lambda: |-
                int delta = id(g_knob_delta);
                id(g_knob_delta) = 0; // Instantly clear to prevent runaway loops
                
                // Safely calculate the updated clamped values locally
                int cur = lv_arc_get_value(id(arc_fan_speed)->obj);
                int target = cur + delta;
                if (target < 0) target = 0;
                if (target > 26) target = 26;
                
                if (target != cur) {
                  // Push the updated speed integer directly to the widget structure
                  lv_arc_set_value(id(arc_fan_speed)->obj, target);
                  
                  // Signal a change event so your text updates and background scripts execute
                  lv_event_send(id(arc_fan_speed)->obj, LV_EVENT_VALUE_CHANGED, NULL);
                }
